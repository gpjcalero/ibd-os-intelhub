<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>IBD OS — Strategic Intelligence</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.64.1/build/stlite.css" />
    <style>
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #238636;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .brand {
            font-weight: 300;
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        #error-msg {
            display: none;
            color: #ff7b72;
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            border: 1px solid #ff7b72;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="brand">IBD OS v5.0 — IntelHub</div>
        <div class="spinner"></div>
        <div id="status" style="font-size: 0.9rem; color: #8b949e; margin-top: 10px;">
            Instalando entorno Python y AI Engine...
        </div>
        <div id="error-msg">
            Hubo un error al iniciar. Por favor usa Chrome/Edge actualizado.
        </div>
    </div>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.64.1/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["pandas", "openpyxl", "xlsxwriter", "numpy", "requests", "google-generativeai"],
            entrypoint: "app.py",
            files: {
                "app.py": { url: "app.py" },
                "core/__init__.py": { url: "core/__init__.py" },
                "core/ai_research.py": { url: "core/ai_research.py" },
                "core/matching.py": { url: "core/matching.py" },
                "core/normalizer.py": { url: "core/normalizer.py" },
                "core/research.py": { url: "core/research.py" },
                "core/scoring.py": { url: "core/scoring.py" }
            },
        }, document.getElementById("root")).catch(err => {
            console.error(err);
            document.getElementById('error-msg').style.display = 'block';
            document.querySelector('.spinner').style.display = 'none';
        });

        const observer = new MutationObserver((mutations) => {
            if (document.querySelector('.stApp')) {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
</body>

</html>
